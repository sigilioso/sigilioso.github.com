<!doctype html>
<html lang="es">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <title>Pistas</title>
  </head>
  <body class="mx-auto" style="width: 500px">
    <h1>Pistas</h1>
    <form>
      <div class="form-row align-items-center">
        <div class="col-auto">
          <label class="sr-only" for="idName">¿Quién?</label>
          <div class="input-group mb-2">
            <div class="input-group-prepend">
              <div class="input-group-text">¿Quién?</div>
            </div>
            <input type="text" class="form-control" id="idName">
          </div>
        </div>
        <div class="col-auto">
          <button type="button" id="show" class="btn btn-primary mb-2">Mostrar</button>
        </div>
      </div>
    </form>
    <p>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdczqjhkam9OsTw99KGo567h08HsoLO57EqiJfDr3HuzjVsEA/viewform" class="btn btn-info" role="button">Estamos listos</a>
    </p>
    <img id="esmeralda" class="clue" src="./esmeralda.png" class="img-fluid" alt="pista1" style="display:none;">
    <img id="manolo" class="clue" src="./manolo.png" class="img-fluid" alt="pista2" style="display:none;">
    <img id="toni" class="clue" src="./toni.gif" class="img-fluid" alt="pista3" style="transform: rotate(180deg); display:none;">
    <img id="miriam" class = "clue" src="./miriam.png" class="img-fluid" alt="pista4" style="display:none">
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script>
    $("#show").click(function() {
      $(".clue").hide();
      v = $("#idName").val().toLowerCase();
      if ( v == "antonio" ) {
        v = "toni";
      }
      if (v.length > 0) {
        vId = "#" + v
        clue = $(vId);
        if (clue.length > 0) {
          clue.show();
        }
      }
    });
    </script>
  </body>
</html>
